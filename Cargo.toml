[workspace]
members = [
    "crates/cli",
    "crates/core",
    "crates/dns",
    "crates/enter",
    "crates/fsmon",
    "crates/nfq",
    "crates/policyd",
    "crates/syscall",
    "crates/syscall-arm",
    "crates/syscall-broker",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT"
version = "0.1.0"

[workspace.dependencies]
# internal crates
agent-sandbox-core    = { path = "crates/core" }
agent-sandbox-syscall = { path = "crates/syscall" }

# external
caps               = "0.5.6"
clap               = { version = "4.6.1", features = ["derive"] }
dns-lookup         = "3.0.1"
hickory-proto      = "0.26.1"
libc               = "0.2.186"
nfq-updated        = "0.2.6"
nix                = "0.31.3"
seccompiler        = { git = "https://github.com/rust-vmm/seccompiler.git", rev = "08587106340b8e3cb361c7561411510039436857" }
serde              = { version = "1", features = ["derive"] }
serde_json         = "1.0.50"
tempfile           = "3.27.0"
thiserror          = "2.0.18"
tokio              = "1.52.3"
tracing            = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
uuid               = { version = "1.23.4", features = ["v7"] }
globset             = "0.4"
which              = "8.0.4"

[workspace.lints.rust]
unsafe_code = "deny"

[workspace.lints.clippy]
cast_lossless               = "allow"
doc_markdown                = "allow"
enum_variant_names          = "allow"
ignored_unit_patterns       = "allow"
inline_always               = "allow"
missing_const_for_fn        = "allow"
missing_errors_doc          = "allow"
missing_panics_doc          = "allow"
module_name_repetitions     = "allow"
must_use_candidate          = "allow"
nursery                     = { level = "warn", priority = -1 }
option_if_let_else          = "allow"
or_fun_call                 = "allow"
pedantic                    = { level = "warn", priority = -1 }
redundant_pub_crate         = "allow"
significant_drop_tightening = "allow"
similar_names               = "allow"
struct_excessive_bools      = "allow"
struct_field_names          = "allow"
too_many_lines              = "allow"
unnecessary_wraps           = "allow"
unused_async                = "allow"
use_self                    = "allow"
used_underscore_binding     = "allow"
